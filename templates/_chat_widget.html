<div id="assistant-widget">
  <style>
    #assistant-btn {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan, #00e6d0));
      color: #fff; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,194,255,0.4);
      font-size: 24px; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease;
    }
    #assistant-btn:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(0,194,255,0.5); }
    #assistant-btn .badge-dot {
      position: absolute; top: -2px; right: -2px; width: 12px; height: 12px;
      background: var(--accent-red); border-radius: 50%; border: 2px solid var(--bg-body);
      animation: pulse 2s infinite;
    }
    #assistant-panel {
      position: fixed; bottom: 90px; right: 24px; z-index: 9998;
      width: 380px; height: 520px; background: var(--bg-card);
      border: 1px solid var(--border-color); border-radius: var(--radius-lg);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      display: none; flex-direction: column; overflow: hidden;
      animation: slideUp 0.3s ease-out;
    }
    #assistant-panel.open { display: flex; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .assistant-header {
      padding: 14px 16px; background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex; justify-content: space-between; align-items: center;
    }
    .assistant-header h3 { margin: 0; font-size: 0.95rem; font-weight: 700; color: var(--accent-blue); }
    .assistant-header .close-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 4px; }
    .assistant-header .close-btn:hover { color: var(--text-primary); }

    .assistant-messages {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .assistant-messages::-webkit-scrollbar { width: 4px; }
    .assistant-messages::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

    .msg { padding: 10px 14px; border-radius: var(--radius-md); max-width: 90%; font-size: 0.82rem; line-height: 1.5; white-space: pre-wrap; }
    .msg.bot { background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.user { background: var(--accent-blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg strong { color: var(--accent-cyan, #00e6d0); }
    .msg.user strong { color: #fff; }
    .msg .typing-dots { display: inline-flex; gap: 4px; }
    .msg .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: typingBounce 1.4s infinite; }
    .msg .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .msg .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

    .assistant-quick-actions {
      display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 16px;
      border-top: 1px solid var(--border-color);
    }
    .assistant-quick-actions button {
      padding: 4px 10px; border: 1px solid var(--border-color); border-radius: 999px;
      background: transparent; color: var(--text-secondary); font-size: 0.72rem;
      cursor: pointer; transition: all var(--transition-fast); white-space: nowrap;
    }
    .assistant-quick-actions button:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

    .assistant-input-area {
      display: flex; padding: 8px 12px; gap: 8px;
      border-top: 1px solid var(--border-color); background: var(--bg-secondary);
    }
    .assistant-input-area input {
      flex: 1; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 20px;
      background: var(--bg-primary); color: var(--text-primary); font-size: 0.82rem; outline: none;
    }
    .assistant-input-area input:focus { border-color: var(--accent-blue); }
    .assistant-input-area button {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: var(--accent-blue); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .assistant-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 480px) {
      #assistant-panel { width: calc(100vw - 32px); right: 16px; bottom: 80px; height: 480px; }
      #assistant-btn { bottom: 16px; right: 16px; width: 48px; height: 48px; font-size: 20px; }
    }
  </style>

  <button id="assistant-btn" onclick="toggleAssistant()" title="AI Trading Assistant">
    <i class="fas fa-robot"></i>
    <span class="badge-dot"></span>
  </button>

  <div id="assistant-panel">
    <div class="assistant-header">
      <h3><i class="fas fa-robot" style="margin-right:6px;"></i> AI Assistant</h3>
      <button class="close-btn" onclick="toggleAssistant()"><i class="fas fa-times"></i></button>
    </div>
    <div class="assistant-messages" id="assistant-messages">
      <div class="msg bot">
        <strong>Hello!</strong> I'm your AI Trading Assistant.
        Ask me about signals, strategies, risk, or your portfolio.
      </div>
    </div>
    <div class="assistant-quick-actions" id="assistant-quick-actions">
      <button onclick="quickAsk('Analyze NIFTY50')">📊 NIFTY50</button>
      <button onclick="quickAsk('Market sentiment')">📈 Sentiment</button>
      <button onclick="quickAsk('Risk management tips')">🛡️ Risk</button>
      <button onclick="quickAsk('Explain RSI')">💡 RSI</button>
      <button onclick="quickAsk('Portfolio summary')">📋 Portfolio</button>
      <button onclick="quickAsk('What is leverage?')">🎓 Leverage</button>
    </div>
    <div class="assistant-input-area">
      <input type="text" id="assistant-input" placeholder="Ask about trading..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button id="assistant-send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script>
var assistantOpen = false;

function toggleAssistant() {
  var panel = document.getElementById('assistant-panel');
  assistantOpen = !assistantOpen;
  panel.classList.toggle('open');
  if (assistantOpen) {
    document.getElementById('assistant-input').focus();
    var msgs = document.getElementById('assistant-messages');
    msgs.scrollTop = msgs.scrollHeight;
    var dot = document.querySelector('#assistant-btn .badge-dot');
    if (dot) dot.style.display = 'none';
  }
}

function quickAsk(text) {
  document.getElementById('assistant-input').value = text;
  sendMessage();
}

function sendMessage() {
  var input = document.getElementById('assistant-input');
  var message = input.value.trim();
  if (!message) return;

  input.value = '';
  addMessage(message, 'user');
  showTyping();

  var btn = document.getElementById('assistant-send-btn');
  btn.disabled = true;

  fetch('/api/assistant/ask', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: message })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    removeTyping();
    addMessage(data.text || 'No response', 'bot');
  })
  .catch(function() {
    removeTyping();
    addMessage('Sorry, I encountered an error. Please try again.', 'bot');
  })
  .finally(function() {
    btn.disabled = false;
  });
}

function addMessage(text, sender) {
  var container = document.getElementById('assistant-messages');
  var div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.innerHTML = text.replace(/\n/g, '<br>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  var container = document.getElementById('assistant-messages');
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  var el = document.getElementById('typing-indicator');
  if (el) el.remove();
}
</script>

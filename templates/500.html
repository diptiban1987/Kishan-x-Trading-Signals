{% extends "base.html" %}

{% block title %}Server Error - {{ platform_name }}{% endblock %}

{% block content %}
<div class="animate-fade-in" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:24px;">
  <div style="width:80px;height:80px;border-radius:50%;background:rgba(255,77,79,0.1);display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
    <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--accent-red);"></i>
  </div>
  <h1 style="font-size:3rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--accent-red),#D32F2F);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">500</h1>
  <p style="font-size:1.1rem;color:var(--text-secondary);margin-bottom:24px;max-width:400px;">Something went wrong on our end. Please try again later.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fas fa-home"></i> Return to Home</a>
</div>
{% endblock %}
